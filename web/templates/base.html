<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}iRidi Support Agent{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1729;
            color: #e1e7f0;
            min-height: 100vh;
        }
        .header {
            background: #1a2647;
            border-bottom: 1px solid #2a3a5c;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 18px; font-weight: 600; color: #7eb8ff; }
        .header h1 a { color: #7eb8ff; text-decoration: none; }
        .header .nav { display: flex; gap: 16px; align-items: center; }
        .header .nav a { color: #8899bb; text-decoration: none; font-size: 14px; }
        .header .nav a:hover { color: #7eb8ff; }
        .btn {
            display: inline-block; padding: 8px 16px; border-radius: 6px;
            font-size: 13px; font-weight: 500; text-decoration: none;
            border: 1px solid transparent; cursor: pointer;
        }
        .btn-primary { background: #3b6eff; color: #fff; }
        .btn-primary:hover { background: #2d5ae0; }
        .btn-outline { background: transparent; border-color: #3a4a6c; color: #8899bb; }
        .btn-outline:hover { border-color: #5a7acc; color: #fff; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-danger:hover { background: #b02a37; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
        .card {
            background: #1a2647; border-radius: 10px;
            border: 1px solid #2a3a5c; padding: 20px; margin-bottom: 16px;
        }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 600; text-transform: uppercase;
        }
        .badge-new { background: #28a745; color: #fff; }
        .badge-open { background: #ffc107; color: #1a1a2e; }
        .badge-solved { background: #6c757d; color: #fff; }
        .badge-pending { background: #17a2b8; color: #fff; }
        .badge-holding { background: #fd7e14; color: #fff; }
        .badge-critical { background: #dc3545; color: #fff; }
        .confidence-high { color: #28a745; }
        .confidence-mid { color: #ffc107; }
        .confidence-low { color: #dc3545; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #2a3a5c; font-size: 13px; }
        .table th { color: #6a7a9c; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .table tr:hover { background: #1e2d52; }
        .table tr { cursor: pointer; }
        a { color: #7eb8ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .flex { display: flex; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .text-muted { color: #6a7a9c; }
        .text-sm { font-size: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        pre { background: #0f1729; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
        input, textarea, select {
            background: #0f1729; border: 1px solid #2a3a5c; border-radius: 6px;
            padding: 10px 14px; color: #e1e7f0; font-size: 14px; width: 100%;
        }
        input:focus, textarea:focus { outline: none; border-color: #3b6eff; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #8899bb; }
        .msg { padding: 12px; border-left: 3px solid #3b6eff; margin-bottom: 12px; background: #0f1729; border-radius: 0 6px 6px 0; }
        .msg .meta { font-size: 11px; color: #6a7a9c; margin-bottom: 6px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f1729; }
        ::-webkit-scrollbar-thumb { background: #2a3a5c; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="/">iRidi Support Agent L1</a></h1>
        <div class="nav">
            <a href="/tickets">Тикеты</a>
            <a href="/logout">Выйти</a>
        </div>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
