<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Omnigent TicketDB{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/static/style.css" rel="stylesheet" />
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Omnigent</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if page == 'dashboard' %}active{% endif %}" href="/">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page == 'tickets' %}active{% endif %}" href="/tickets">Tickets</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page == 'kb' %}active{% endif %}" href="/kb">KB (Legacy)</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page == 'bookstack' %}active{% endif %}" href="/bookstack">BookStack</a>
                </li>
            </ul>
            <a class="btn btn-outline-light btn-sm" href="http://127.0.0.1:7987/docs" target="_blank">API</a>
        </div>
    </div>
</nav>

{% if msg %}
<div class="container mt-3">
    <div class="alert alert-info alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>
{% endif %}

<main class="container mt-4 mb-5">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
